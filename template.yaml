AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  trend-monitor - SCMリスク監視システム

Globals:
  Function:
    Runtime: python3.13
    Timeout: 900
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        POWERTOOLS_LOG_LEVEL: INFO
        POWERTOOLS_LOGGER_LOG_EVENT: true

Parameters:
  StageName:
    Type: String
    Default: dev
  SecretName:
    Type: String
    Default: trend-monitor/dev/x-api-token
  SearchMaxResults:
    Type: String
    Default: "10"

Resources:
  # -----------------------------------------------------------
  # S3 Bucket
  # -----------------------------------------------------------
  TrendOutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub trend-monitor-output-${StageName}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawData
            Prefix: raw/
            Status: Enabled
            ExpirationInDays: 90

  # -----------------------------------------------------------
  # DynamoDB Table（Single Table Design）
  # -----------------------------------------------------------
  TrendTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub trend-monitor-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # -----------------------------------------------------------
  # SNS Topic（通知用）
  # -----------------------------------------------------------
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub trend-monitor-notification-${StageName}

  # -----------------------------------------------------------
  # Lambda Layer（共通ユーティリティ + 依存パッケージ）
  # -----------------------------------------------------------
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      ContentUri: layers/common/
      LayerName: !Sub trend-monitor-common-layers-${StageName}
      RetentionPolicy: Delete
      CompatibleRuntimes:
        - python3.13
    Metadata:
      BuildMethod: python3.13

  # -----------------------------------------------------------
  # IAM Role: Lambda共通
  # -----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub trend-monitor-lambda-role-${StageName}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TrendMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                Resource:
                  - !GetAtt TrendTable.Arn
                  - !Sub ${TrendTable.Arn}/index/*
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/SupplyChainMaster
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/SupplyChainMaster/index/*
              - Effect: Allow
                Action: s3:PutObject
                Resource: !Sub arn:aws:s3:::${TrendOutputBucket}/*
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub arn:aws:s3:::${TrendOutputBucket}/*
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - arn:aws:bedrock:*::foundation-model/anthropic.claude-*
                  - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*.anthropic.claude-*
              - Effect: Allow
                Action:
                  - aws-marketplace:Subscribe
                  - aws-marketplace:Unsubscribe
                  - aws-marketplace:ViewSubscriptions
                Resource: '*'

  # -----------------------------------------------------------
  # Lambda: Trend Fetcher（ルートA - トレンド線）
  # -----------------------------------------------------------
  TrendFetcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trend-fetcher-${StageName}
      Handler: trend_fetcher_function.lambda_handler
      CodeUri: function/trend_fetcher/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref TrendTable
          BUCKET_NAME: !Ref TrendOutputBucket
          SECRET_NAME: !Ref SecretName
          STAGE: !Ref StageName
          SEARCH_MAX_RESULTS: !Ref SearchMaxResults
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: Keyword Search（ルートB - キーワード線）
  # -----------------------------------------------------------
  KeywordSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub keyword-search-${StageName}
      Handler: keyword_search_function.lambda_handler
      CodeUri: function/keyword_search/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref TrendTable
          BUCKET_NAME: !Ref TrendOutputBucket
          SECRET_NAME: !Ref SecretName
          STAGE: !Ref StageName
          SEARCH_MAX_RESULTS: !Ref SearchMaxResults
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: Classification Processor（raw S3 → 第2/3段階分類）
  # -----------------------------------------------------------
  ClassificationProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub classification-processor-${StageName}
      Handler: classification_processor_function.lambda_handler
      CodeUri: function/classification_processor/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          BUCKET_NAME: !Ref TrendOutputBucket
          STAGE: !Ref StageName
          SUPPLY_CHAIN_TABLE_NAME: SupplyChainMaster
          CLASSIFICATION_MODEL_ID: jp.anthropic.claude-sonnet-4-6
          AI_BATCH_SIZE: "8"
      Events:
        RawObjectCreated:
          Type: S3
          Properties:
            Bucket: !Ref TrendOutputBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .json

Outputs:
  TrendTableName:
    Value: !Ref TrendTable
  TrendOutputBucketName:
    Value: !Ref TrendOutputBucket
  TrendFetcherArn:
    Value: !GetAtt TrendFetcherFunction.Arn
  KeywordSearchArn:
    Value: !GetAtt KeywordSearchFunction.Arn
  ClassificationProcessorArn:
    Value: !GetAtt ClassificationProcessorFunction.Arn
  NotificationTopicArn:
    Value: !Ref NotificationTopic
