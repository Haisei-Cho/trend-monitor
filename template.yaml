AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  trend-monitor - SCMリスク監視システム

Globals:
  Function:
    Runtime: python3.13
    Timeout: 900
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        POWERTOOLS_LOG_LEVEL: INFO
        POWERTOOLS_LOGGER_LOG_EVENT: true

Parameters:
  StageName:
    Type: String
    Default: dev
  SecretName:
    Type: String
    Default: trend-monitor/dev/x-api-token
  SearchMaxResults:
    Type: String
    Default: "10"
  SupplyChainMasterTableName:
    Type: String
    Default: SupplyChainMaster

Resources:
  # -----------------------------------------------------------
  # S3 Bucket
  # -----------------------------------------------------------
  TrendOutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub trend-monitor-output-${StageName}-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawData
            Prefix: raw/
            Status: Enabled
            ExpirationInDays: 90
          - Id: ExpireClassifiedData
            Prefix: classified/
            Status: Enabled
            ExpirationInDays: 90
          - Id: ExpireFactsOfficial
            Prefix: facts/official/
            Status: Enabled
            ExpirationInDays: 7

  # -----------------------------------------------------------
  # DynamoDB Table（Single Table Design）
  # -----------------------------------------------------------
  TrendTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub trend-monitor-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # -----------------------------------------------------------
  # DynamoDB Table（RoadwayTraffic - 交通規制情報専用）
  # -----------------------------------------------------------
  RoadwayTrafficTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub roadway-traffic-${StageName}
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # -----------------------------------------------------------
  # DynamoDB Table（EventTable - リスクイベント管理）
  # -----------------------------------------------------------
  EventTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub event-table-${StageName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # -----------------------------------------------------------
  # SNS Topic（通知用）
  # -----------------------------------------------------------
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub trend-monitor-notification-${StageName}

  # -----------------------------------------------------------
  # Lambda Layer（共通ユーティリティ + 依存パッケージ）
  # -----------------------------------------------------------
  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      ContentUri: layers/common/
      LayerName: !Sub trend-monitor-common-layers-${StageName}
      RetentionPolicy: Delete
      CompatibleRuntimes:
        - python3.13
    Metadata:
      BuildMethod: python3.13

  # -----------------------------------------------------------
  # IAM Role: Lambda共通
  # -----------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub trend-monitor-lambda-role-${StageName}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TrendMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt TrendTable.Arn
                  - !Sub ${TrendTable.Arn}/index/*
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !Sub arn:aws:s3:::${TrendOutputBucket}
                  - !Sub arn:aws:s3:::${TrendOutputBucket}/*
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SupplyChainMasterTableName}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SupplyChainMasterTableName}/index/*
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource:
                  - arn:aws:bedrock:*::foundation-model/anthropic.claude-*
                  - !Sub arn:aws:bedrock:*:${AWS::AccountId}:inference-profile/*.anthropic.claude-*
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt RoadwayTrafficTable.Arn
                  - !Sub ${RoadwayTrafficTable.Arn}/index/*
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt EventTable.Arn
                  - !Sub ${EventTable.Arn}/index/*
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource:
                  - !Sub ${RoadwayTrafficTable.Arn}/stream/*
              - Effect: Allow
                Action:
                  - aws-marketplace:Subscribe
                  - aws-marketplace:Unsubscribe
                  - aws-marketplace:ViewSubscriptions
                Resource: '*'

  # -----------------------------------------------------------
  # Lambda: Trend Fetcher（ルートA - トレンド線）
  # -----------------------------------------------------------
  TrendFetcherFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub trend-fetcher-${StageName}
      Handler: trend_fetcher_function.lambda_handler
      CodeUri: function/trend_fetcher/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref TrendTable
          BUCKET_NAME: !Ref TrendOutputBucket
          SECRET_NAME: !Ref SecretName
          STAGE: !Ref StageName
          SEARCH_MAX_RESULTS: !Ref SearchMaxResults
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: Keyword Search（ルートB - キーワード線）
  # -----------------------------------------------------------
  KeywordSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub keyword-search-${StageName}
      Handler: keyword_search_function.lambda_handler
      CodeUri: function/keyword_search/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          TABLE_NAME: !Ref TrendTable
          BUCKET_NAME: !Ref TrendOutputBucket
          SECRET_NAME: !Ref SecretName
          STAGE: !Ref StageName
          SEARCH_MAX_RESULTS: !Ref SearchMaxResults
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: Category Classifier（カテゴリ分類）
  # -----------------------------------------------------------
  CategoryClassifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub category-classifier-${StageName}
      Handler: category_classifier_function.lambda_handler
      CodeUri: function/category_classifier/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          BUCKET_NAME: !Ref TrendOutputBucket
          STAGE: !Ref StageName
      Events:
        S3Event:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref TrendOutputBucket
                object:
                  key:
                    - prefix: raw/

  # -----------------------------------------------------------
  # Lambda: JMA Collector（気象庁データ収集 - 地震・津波）
  # -----------------------------------------------------------
  JmaCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub jma-collector-${StageName}
      Handler: jma_collector_function.lambda_handler
      CodeUri: function/jma_collector/
      Timeout: 300
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          BUCKET_NAME: !Ref TrendOutputBucket
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: Roadway Collector（交通規制情報クロール）
  # -----------------------------------------------------------
  RoadwayCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub roadway-collector-${StageName}
      Handler: roadway_collector_function.lambda_handler
      CodeUri: function/roadway_collector/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          ROADWAY_TABLE_NAME: !Ref RoadwayTrafficTable
          STAGE: !Ref StageName
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: News Collector（Google News RSS ニュース収集）
  # -----------------------------------------------------------
  NewsCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub news-collector-${StageName}
      Handler: news_collector_function.lambda_handler
      CodeUri: function/news_collector/
      Role: !GetAtt LambdaExecutionRole.Arn
      ReservedConcurrentExecutions: 1
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          BUCKET_NAME: !Ref TrendOutputBucket
          TABLE_NAME: !Ref TrendTable
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(30 minutes)
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: OfficialCollector（X API 公式アカウント監視）
  # -----------------------------------------------------------
  OfficialCollectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub official-collector-${StageName}
      Handler: official_collector_function.lambda_handler
      CodeUri: function/official_collector/
      Role: !GetAtt LambdaExecutionRole.Arn
      ReservedConcurrentExecutions: 1
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          BUCKET_NAME: !Ref TrendOutputBucket
          TABLE_NAME: !Ref TrendTable
          SECRET_NAME: !Ref SecretName
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: NodeIndexGenerator（ノードインデックス生成 - 日次）
  # -----------------------------------------------------------
  NodeIndexGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub node-index-generator-${StageName}
      Handler: node_index_generator_function.lambda_handler
      CodeUri: function/node_index_generator/
      Timeout: 300
      MemorySize: 256
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          SC_TABLE_NAME: !Ref SupplyChainMasterTableName
          BUCKET_NAME: !Ref TrendOutputBucket
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 17 * * ? *)
            Description: 日次ノードインデックス更新（JST 02:00）
            Enabled: false

  # -----------------------------------------------------------
  # Lambda: FactChecker（ファクトチェック・リスクイベント判定）
  # -----------------------------------------------------------
  FactCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub fact-checker-${StageName}
      Handler: fact_checker_function.lambda_handler
      CodeUri: function/fact_checker/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          BUCKET_NAME: !Ref TrendOutputBucket
          EVENT_TABLE_NAME: !Ref EventTable
          ROADWAY_TABLE_NAME: !Ref RoadwayTrafficTable
          STAGE: !Ref StageName
      Events:
        ClassifiedS3Event:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref TrendOutputBucket
                object:
                  key:
                    - prefix: classified/
        FactsS3Event:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref TrendOutputBucket
                object:
                  key:
                    - prefix: facts/

  # -----------------------------------------------------------
  # Lambda: RoadwayFactChecker（交通規制→リスクイベント判定）
  # -----------------------------------------------------------
  RoadwayFactCheckerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub roadway-fact-checker-${StageName}
      Handler: roadway_fact_checker_function.lambda_handler
      CodeUri: function/roadway_fact_checker/
      Role: !GetAtt LambdaExecutionRole.Arn
      Layers:
        - !Ref CommonLayer
      Environment:
        Variables:
          BUCKET_NAME: !Ref TrendOutputBucket
          EVENT_TABLE_NAME: !Ref EventTable
          STAGE: !Ref StageName
      Events:
        RoadwayStreamsEvent:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt RoadwayTrafficTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            MaximumRetryAttempts: 3
            BisectBatchOnFunctionError: true
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName": ["INSERT"]}'

Outputs:
  TrendTableName:
    Value: !Ref TrendTable
  TrendOutputBucketName:
    Value: !Ref TrendOutputBucket
  TrendFetcherArn:
    Value: !GetAtt TrendFetcherFunction.Arn
  KeywordSearchArn:
    Value: !GetAtt KeywordSearchFunction.Arn
  CategoryClassifierArn:
    Value: !GetAtt CategoryClassifierFunction.Arn
  JmaCollectorArn:
    Value: !GetAtt JmaCollectorFunction.Arn
  RoadwayTrafficTableName:
    Value: !Ref RoadwayTrafficTable
  RoadwayCollectorArn:
    Value: !GetAtt RoadwayCollectorFunction.Arn
  NewsCollectorArn:
    Value: !GetAtt NewsCollectorFunction.Arn
  OfficialCollectorArn:
    Value: !GetAtt OfficialCollectorFunction.Arn
  EventTableName:
    Value: !Ref EventTable
  FactCheckerArn:
    Value: !GetAtt FactCheckerFunction.Arn
  RoadwayFactCheckerArn:
    Value: !GetAtt RoadwayFactCheckerFunction.Arn
  NodeIndexGeneratorArn:
    Value: !GetAtt NodeIndexGeneratorFunction.Arn
  NotificationTopicArn:
    Value: !Ref NotificationTopic
